services:
  bot:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - bot-data:/app/data
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - PHONE=${PHONE}
      - ADMIN_IDS=${ADMIN_IDS:-YOUR_ADMIN_ID}
      - YUKASSA_SHOP_ID=${YUKASSA_SHOP_ID:-}
      - YUKASSA_SECRET_KEY=${YUKASSA_SECRET_KEY:-}
      - DB_PATH=data/bot.db
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 0"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  bot-data:
